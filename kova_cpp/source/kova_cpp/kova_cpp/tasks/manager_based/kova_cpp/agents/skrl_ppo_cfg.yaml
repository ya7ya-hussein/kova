seed: 42

# =============================================================================
# Models
# =============================================================================
# Policy is a Gaussian MLP; value is a deterministic MLP. They share no params.
models:
  separate: True

  policy:
    class: GaussianMixin
    clip_actions: False
    clip_log_std: True
    min_log_std: -20.0
    max_log_std: 2.0
    initial_log_std: 0.0
    network:
      - name: net
        input: OBSERVATIONS
        layers: [512, 256, 128]
        activations: elu
    output: ACTIONS  # tanh-bounded inside skrl when clip_actions=False; we rely on diff_drive scaling

  value:
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: OBSERVATIONS
        layers: [512, 256, 128]
        activations: elu
    output: ONE


# =============================================================================
# Rollout memory
# =============================================================================
memory:
  class: RandomMemory
  memory_size: -1   # let skrl size it from rollouts × num_envs


# =============================================================================
# PPO agent
# =============================================================================
agent:
  class: PPO
  rollouts: 16
  learning_epochs: 8
  mini_batches: 4
  discount_factor: 0.99
  lambda: 0.95
  learning_rate: 3.0e-4
  learning_rate_scheduler: KLAdaptiveLR
  learning_rate_scheduler_kwargs:
    kl_threshold: 0.01
  state_preprocessor: RunningStandardScaler
  state_preprocessor_kwargs: null
  value_preprocessor: RunningStandardScaler
  value_preprocessor_kwargs: null
  random_timesteps: 0
  learning_starts: 0
  grad_norm_clip: 0.5
  ratio_clip: 0.2
  value_clip: 0.2
  clip_predicted_values: True
  entropy_loss_scale: 0.001
  value_loss_scale: 0.5
  kl_threshold: 0.0
  rewards_shaper_scale: 1.0
  time_limit_bootstrap: True
  experiment:
    directory: "kova_cpp"
    experiment_name: "ppo_run1"
    write_interval: auto
    checkpoint_interval: auto


# =============================================================================
# Trainer
# =============================================================================
trainer:
  class: SequentialTrainer
  timesteps: 1_000_000
  environment_info: log
